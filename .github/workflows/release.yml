name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag (e.g. v0.1.1)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release-macos:
    runs-on: macos-14
    timeout-minutes: 240
    env:
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      CODESIGN_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
      NOTARY_PROFILE_NAME: ${{ vars.NOTARY_PROFILE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          if [ -n "${INPUT_TAG:-}" ]; then
            if [[ "${INPUT_TAG}" != v* ]]; then
              echo "Invalid release_tag: ${INPUT_TAG} (must start with v)"
              exit 1
            fi
            TAG="${INPUT_TAG}"
            VERSION="${TAG#v}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* && "${GITHUB_REF_NAME:-}" == v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION=$(python3 - <<'PY'
            import json
            from pathlib import Path
            data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
            print(data["version"])
            PY
            )
            TAG="v${VERSION}"
          fi

          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved release: tag=${TAG}, version=${VERSION}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CODESIGN_IDENTITY:-}" ]; then
            echo "Missing repo variable: CODESIGN_IDENTITY"
            exit 1
          fi
          if [ -z "${APPLE_CERTIFICATE_P12:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing APPLE_CERTIFICATE_P12 or APPLE_CERTIFICATE_PASSWORD secret"
            exit 1
          fi
          KEYCHAIN=build.keychain
          CERT_PATH=cert.p12

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH" 2>/dev/null || \
            echo "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"

      - name: Configure notarytool credentials
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_B64: ${{ secrets.APPLE_API_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${NOTARY_PROFILE_NAME:-}" ]; then
            echo "Missing repo variable: NOTARY_PROFILE_NAME"
            exit 1
          fi
          if [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER_ID:-}" ] || [ -z "${APPLE_API_PRIVATE_KEY_B64:-}" ]; then
            echo "Missing APPLE_API_KEY_ID / APPLE_API_ISSUER_ID / APPLE_API_PRIVATE_KEY_B64 secret"
            exit 1
          fi

          mkdir -p private_keys
          echo "$APPLE_API_PRIVATE_KEY_B64" | base64 --decode > private_keys/AuthKey.p8 2>/dev/null || \
            echo "$APPLE_API_PRIVATE_KEY_B64" | base64 -D > private_keys/AuthKey.p8

          xcrun notarytool store-credentials "$NOTARY_PROFILE_NAME" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --key "private_keys/AuthKey.p8"

      - name: Prepare notary helpers
        run: |
          set -euo pipefail
          NOTARY_HELPERS="$RUNNER_TEMP/notary_helpers.sh"
          cat > "$NOTARY_HELPERS" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          notary_log() {
            echo "$@" >&2
          }

          is_transient_notary_error() {
            echo "$1" | grep -Eqi "NSURLErrorDomain Code=-1009|The Internet connection appears to be offline|timed out|network.*(offline|route|unreachable)|temporarily unavailable|HTTP status code: 5[0-9]{2}|service.*unavailable|gateway timeout|Connection reset by peer|Could not resolve host"
          }

          notary_preflight() {
            local max_attempts="${1:-2}"
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              notary_log "[notary][preflight] attempt ${attempt}/${max_attempts}"
              local output
              set +e
              output="$(xcrun notarytool history --keychain-profile "$NOTARY_PROFILE_NAME" --output-format json 2>&1)"
              local rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                notary_log "[notary][preflight] ok"
                return 0
              fi
              notary_log "$output"
              if ! is_transient_notary_error "$output"; then
                notary_log "[notary][preflight] non-transient failure"
                return "$rc"
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                notary_log "[notary][preflight] retries exhausted"
                return "$rc"
              fi
              local backoff=$((attempt * 15))
              notary_log "[notary][preflight] transient failure, retry in ${backoff}s"
              sleep "$backoff"
              attempt=$((attempt + 1))
            done
          }

          notary_submit_with_retry() {
            local artifact="$1"
            local label="$2"
            local max_attempts="${3:-3}"
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              notary_log "[notary][$label] submit attempt ${attempt}/${max_attempts}"
              local output
              set +e
              output="$(xcrun notarytool submit "$artifact" --keychain-profile "$NOTARY_PROFILE_NAME" --output-format json --no-progress 2>&1)"
              local rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                local submission_id
                submission_id="$(printf '%s' "$output" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("id", ""))' 2>/dev/null || true)"
                if [ -n "$submission_id" ]; then
                  printf '%s\n' "$submission_id"
                  return 0
                fi
                notary_log "[notary][$label] submit succeeded but id parse failed"
                notary_log "$output"
                return 1
              fi
              notary_log "$output"
              if ! is_transient_notary_error "$output"; then
                notary_log "[notary][$label] non-transient submit failure"
                return "$rc"
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                notary_log "[notary][$label] submit retries exhausted"
                return "$rc"
              fi
              local backoff=$((attempt * 30))
              notary_log "[notary][$label] transient submit failure, retry in ${backoff}s"
              sleep "$backoff"
              attempt=$((attempt + 1))
            done
          }

          notary_wait_for_result() {
            local submission_id="$1"
            local label="$2"
            local max_wait_seconds="${3:-2400}"
            local poll_interval_seconds="${4:-20}"
            local deadline=$(( $(date +%s) + max_wait_seconds ))
            while true; do
              if [ "$(date +%s)" -ge "$deadline" ]; then
                notary_log "[notary][$label] timeout after ${max_wait_seconds}s (id=${submission_id})"
                return 124
              fi

              local output
              set +e
              output="$(xcrun notarytool info "$submission_id" --keychain-profile "$NOTARY_PROFILE_NAME" --output-format json 2>&1)"
              local rc=$?
              set -e
              if [ "$rc" -ne 0 ]; then
                notary_log "$output"
                if is_transient_notary_error "$output"; then
                  notary_log "[notary][$label] transient status query failure, retry in ${poll_interval_seconds}s"
                  sleep "$poll_interval_seconds"
                  continue
                fi
                notary_log "[notary][$label] non-transient status query failure"
                return "$rc"
              fi

              local status
              status="$(printf '%s' "$output" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status", ""))' 2>/dev/null || true)"
              local status_lc
              status_lc="$(printf '%s' "$status" | tr '[:upper:]' '[:lower:]')"
              notary_log "[notary][$label][$(date -u +"%Y-%m-%dT%H:%M:%SZ")] status=${status:-unknown} id=${submission_id}"
              if [ "$status_lc" = "accepted" ]; then
                return 0
              fi
              if [ "$status_lc" = "invalid" ] || [ "$status_lc" = "rejected" ]; then
                notary_log "$output"
                return 2
              fi
              sleep "$poll_interval_seconds"
            done
          }

          notary_dump_log() {
            local submission_id="$1"
            local label="$2"
            notary_log "[notary][$label] fetching failure log for id=${submission_id}"
            set +e
            local log_output
            log_output="$(xcrun notarytool log "$submission_id" --keychain-profile "$NOTARY_PROFILE_NAME" 2>&1)"
            local rc=$?
            set -e
            notary_log "$log_output"
            return "$rc"
          }

          notary_submit_and_wait() {
            local artifact="$1"
            local label="$2"
            local max_attempts="${3:-3}"
            local max_wait_seconds="${4:-2400}"
            local poll_interval_seconds="${5:-20}"
            local submission_id
            submission_id="$(notary_submit_with_retry "$artifact" "$label" "$max_attempts")"
            notary_log "[notary][$label] submission id=${submission_id}"
            if ! notary_wait_for_result "$submission_id" "$label" "$max_wait_seconds" "$poll_interval_seconds"; then
              local rc=$?
              notary_dump_log "$submission_id" "$label" || true
              return "$rc"
            fi
            notary_log "[notary][$label] accepted"
          }
          EOF
          chmod +x "$NOTARY_HELPERS"
          echo "NOTARY_HELPERS=$NOTARY_HELPERS" >> "$GITHUB_ENV"

      - name: Notary preflight
        timeout-minutes: 5
        run: |
          set -euo pipefail
          source "$NOTARY_HELPERS"
          notary_preflight 2

      - name: Write Tauri signing key
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_B64:-}" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY_B64 secret"
            exit 1
          fi
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.tauri/agentnexus.key" 2>/dev/null || \
            echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 -D > "$HOME/.tauri/agentnexus.key"

      - name: Build app bundle
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/agentnexus.key")"
          npm run tauri -- build --bundles app

      - name: Codesign app bundle
        run: |
          set -euo pipefail
          APP_BUNDLE="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | sort | head -n 1)"
          if [ -z "${APP_BUNDLE:-}" ]; then
            echo "No macOS .app bundle found for codesign"
            find src-tauri/target/release/bundle -type d | sort
            exit 1
          fi
          codesign --force --deep --options runtime --timestamp --sign "$CODESIGN_IDENTITY" "$APP_BUNDLE"
          codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"

      - name: Notarize and staple app
        timeout-minutes: 95
        run: |
          set -euo pipefail
          source "$NOTARY_HELPERS"

          APP_BUNDLE="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | sort | head -n 1)"
          if [ -z "${APP_BUNDLE:-}" ]; then
            echo "No macOS .app bundle found for notarization"
            find src-tauri/target/release/bundle -type d | sort
            exit 1
          fi
          ditto -c -k --keepParent "$APP_BUNDLE" app-notary.zip
          notary_submit_and_wait app-notary.zip app 2 4800 20
          xcrun stapler staple "$APP_BUNDLE"
          spctl -a -vvv --type execute "$APP_BUNDLE"
          rm -f app-notary.zip

      - name: Collect release artifacts
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"
          mkdir -p release-artifacts
          DMG_ROOT="$(mktemp -d)"

          APP_BUNDLE="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | sort | head -n 1)"
          if [ -z "${APP_BUNDLE:-}" ]; then
            echo "No macOS .app bundle found."
            find src-tauri/target/release/bundle -type d | sort
            exit 1
          fi

          APP_ARCHIVE="$(find src-tauri/target/release/bundle/macos -type f -name '*.app.tar.gz' | sort | head -n 1)"
          if [ -z "${APP_ARCHIVE:-}" ]; then
            echo "No updater archive (*.app.tar.gz) found."
            find src-tauri/target/release/bundle -type f | sort
            exit 1
          fi

          APP_SIG="${APP_ARCHIVE}.sig"
          if [ ! -f "$APP_SIG" ]; then
            echo "Missing updater signature: $APP_SIG"
            exit 1
          fi

          cp "$APP_ARCHIVE" release-artifacts/
          cp "$APP_SIG" release-artifacts/

          ditto -c -k --keepParent "$APP_BUNDLE" release-artifacts/agentnexus.zip

          ditto "$APP_BUNDLE" "${DMG_ROOT}/$(basename "$APP_BUNDLE")"

          if [ "$(uname -m)" = "arm64" ]; then
            MAC_ARCH="aarch64"
          else
            MAC_ARCH="x86_64"
          fi
          DMG_NAME="agentnexus_${VERSION}_${MAC_ARCH}.dmg"
          hdiutil create -volname "agentnexus" \
            -srcfolder "$DMG_ROOT" \
            -ov -format UDZO \
            "release-artifacts/${DMG_NAME}"
          rm -rf "$DMG_ROOT"

          APP_ARCHIVE_NAME="$(basename "$APP_ARCHIVE")"
          if [[ "$APP_ARCHIVE_NAME" == *"x86_64"* ]]; then
            PLATFORM_KEY="darwin-x86_64"
          elif [[ "$APP_ARCHIVE_NAME" == *"aarch64"* || "$APP_ARCHIVE_NAME" == *"arm64"* ]]; then
            PLATFORM_KEY="darwin-aarch64"
          elif [ "$(uname -m)" = "arm64" ]; then
            PLATFORM_KEY="darwin-aarch64"
          else
            PLATFORM_KEY="darwin-x86_64"
          fi

          echo "APP_ARCHIVE_NAME=$APP_ARCHIVE_NAME" >> "$GITHUB_ENV"
          echo "APP_SIG_NAME=$(basename "$APP_SIG")" >> "$GITHUB_ENV"
          echo "PLATFORM_KEY=$PLATFORM_KEY" >> "$GITHUB_ENV"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Codesign, notarize and staple dmg
        timeout-minutes: 95
        run: |
          set -euo pipefail
          source "$NOTARY_HELPERS"

          if [ -z "${DMG_NAME:-}" ]; then
            echo "Missing DMG_NAME from previous step."
            exit 1
          fi

          DMG_PATH="release-artifacts/${DMG_NAME}"
          if [ ! -f "$DMG_PATH" ]; then
            echo "DMG artifact not found: $DMG_PATH"
            ls -la release-artifacts || true
            exit 1
          fi

          codesign --force --timestamp --sign "$CODESIGN_IDENTITY" "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

          notary_submit_and_wait "$DMG_PATH" dmg 2 4800 20
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vvv --type open "$DMG_PATH"

      - name: Build latest.json
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"
          TAG="${RELEASE_TAG}"
          APP_SIG=$(cat "release-artifacts/${APP_SIG_NAME}")

          python3 - <<PY
          import json
          from datetime import datetime, timezone

          version = "${VERSION}"
          tag = "${TAG}"
          app_archive_name = "${APP_ARCHIVE_NAME}"
          app_signature = """${APP_SIG}""".strip()
          platform_key = "${PLATFORM_KEY}"

          latest = {
              "version": version,
              "notes": f"Release {tag}",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  platform_key: {
                      "url": f"https://github.com/lionellc/agentnexus/releases/download/{tag}/{app_archive_name}",
                      "signature": app_signature,
                  }
              },
          }

          with open("release-artifacts/latest.json", "w", encoding="utf-8") as fp:
              json.dump(latest, fp, ensure_ascii=False, indent=2)
              fp.write("\n")
          PY

          {
            echo "# ${TAG}"
            echo
            echo "- Automated release for ${TAG}."
          } > release-artifacts/release-notes.md

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-artifacts/* --clobber
            gh release edit "$TAG" --notes-file release-artifacts/release-notes.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-artifacts/release-notes.md \
              --target "$GITHUB_SHA" \
              release-artifacts/*
          fi
